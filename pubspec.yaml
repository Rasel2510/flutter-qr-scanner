name: qrcraft
description: QR Code Generator & Scanner App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Generate
  qr_flutter: ^4.1.0

  # QR Scan
  mobile_scanner: ^5.2.3

  # Image picker (for scan from gallery)
  image_picker: ^1.1.2

  # Storage
  shared_preferences: ^2.3.3

  # Share + Download
  share_plus: ^10.1.4
  path_provider: ^2.1.4

  # UI
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
